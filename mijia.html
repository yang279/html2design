<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>米家</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #333; }
.app { max-width: 414px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; width: 100%; position: relative; }

.header { background: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #eee; }
.account-select { display: flex; align-items: center; gap: 6px; }
.account-select select { border: none; background: transparent; font-size: 16px; font-weight: 600; color: #333; appearance: none; padding-right: 20px; cursor: pointer; outline: none; }
.account-select .arrow { font-size: 12px; color: #999; }
.header-icons { display: flex; gap: 16px; }
.header-icons span { font-size: 20px; color: #666; cursor: pointer; }

.tabs { background: #fff; display: flex; padding: 0 16px; gap: 24px; border-bottom: 1px solid #eee; }
.tab { padding: 12px 0; font-size: 15px; color: #999; cursor: pointer; position: relative; transition: color 0.2s; }
.tab.active { color: #333; font-weight: 600; }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: #ff6900; border-radius: 1px; }

.content { flex: 1; padding: 12px 16px; background: #fff; }
.device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.device-card { position: relative; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.2s; cursor: pointer; width: 100%; }
.device-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.device-card-top { display: flex; align-items: center; justify-content: space-between; }
.device-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.device-icon.light { background: #fff3e0; color: #ff9800; }
.device-icon.ac { background: #e3f2fd; color: #1976d2; }
.device-icon.camera { background: #fce4ec; color: #e91e63; }
.device-icon.purifier { background: #e8f5e9; color: #4caf50; }
.device-icon.fan { background: #e0f7fa; color: #00bcd4; }
.device-icon.tv { background: #ede7f6; color: #7c4dff; }
.device-icon.lock { background: #fff8e1; color: #ffa000; }
.device-icon.robot { background: #f3e5f5; color: #ab47bc; }
.toggle { width: 44px; height: 24px; border-radius: 12px; background: #ddd; position: relative; cursor: pointer; transition: background 0.3s; flex-shrink: 0; }
.toggle.on { background: #ff6900; }
.toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 10px; background: #fff; top: 2px; left: 2px; transition: left 0.3s; }
.toggle.on::after { left: 22px; }
.device-name { font-size: 14px; font-weight: 500; color: #333; }
.device-room { font-size: 12px; color: #999; }
.device-status { font-size: 12px; color: #666; }

.bottom-nav { background: #fff; display: flex; justify-content: space-around; padding: 8px 0 6px; border-top: 1px solid #eee; position: sticky; bottom: 0; z-index: 100; }
.nav-item { position: relative; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 0; }
.nav-item .icon { font-size: 20px; color: #999; }
.nav-item .label { font-size: 11px; color: #999; }
.nav-item.active .icon, .nav-item.active .label { color: #ff6900; }

.page-detail { display: none; flex-direction: column; min-height: 100vh; }
.page-detail.show { display: flex; }
.page-home.hide { display: none; }
.detail-header { background: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
.back-btn { font-size: 20px; cursor: pointer; color: #333; padding: 4px; }
.detail-header-info { display: flex; flex-direction: column; }
.detail-title { font-size: 16px; font-weight: 600; color: #333; }
.detail-subtitle { font-size: 12px; color: #999; }
.detail-body { flex: 1; padding: 20px 16px; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.detail-icon-large { width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
.detail-params { width: 100%; display: flex; flex-direction: column; gap: 12px; }
.param-row { display: flex; justify-content: space-between; padding: 14px 16px; background: rgba(0,0,0,0.05); border-radius: 10px; }
.param-label { font-size: 14px; color: #666; }
.param-value { font-size: 14px; color: #333; font-weight: 500; }
.detail-unbind { width: 100%; padding: 14px; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; text-align: center; font-size: 14px; color: #e53935; cursor: pointer; margin-top: auto; }
.detail-unbind:hover { background: #fce4ec; }

.ann-marker { position: absolute; width: 24px; height: 24px; background: #ff6900; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); cursor: pointer; z-index: 9999; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; transition: transform 0.2s, box-shadow 0.2s; }
.ann-marker:hover { transform: rotate(-45deg) scale(1.2); box-shadow: 0 3px 12px rgba(255,105,0,0.5); }
.ann-marker .ann-num { transform: rotate(45deg); }
.ann-popup { position: absolute; background: #fff; border-radius: 12px; padding: 14px; width: 240px; box-shadow: 0 6px 20px rgba(0,0,0,0.18); z-index: 10000; font-size: 13px; display: none; top: 0; left: 100%; margin-left: 8px; }
.ann-popup.visible { display: block; }
.ann-popup-author { color: #ff6900; font-weight: 600; font-size: 14px; }
.ann-popup-time { color: #999; font-size: 12px; margin-top: 4px; }
.ann-popup-content { color: #333; margin-top: 10px; line-height: 1.6; }

@media (min-width: 415px) {
  .app { max-width: 768px; }
  .device-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 769px) {
  .app { max-width: 1200px; }
  .device-grid { grid-template-columns: repeat(6, 1fr); }
}
</style>
</head>
<body>
<div class="app" id="appRoot">

<div class="page-home" id="pageHome">

<div class="header">
  <div class="account-select">
    <select id="accountSelect">
      <option>小米用户A</option>
      <option>小米用户B</option>
      <option>小米用户C</option>
    </select>
    <span class="arrow">▼</span>
  </div>
  <div class="header-icons">
    <span>🔍</span>
    <span>➕</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(this)">全屋</div>
  <div class="tab" onclick="switchTab(this)">主卧</div>
  <div class="tab" onclick="switchTab(this)">客厅</div>
</div>

<div class="content">
  <div class="device-grid" id="deviceGrid"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchNav(this)">
    <span class="icon">🏠</span>
    <span class="label">首页</span>
  </div>
  <div class="nav-item" onclick="switchNav(this)">
    <span class="icon">🧠</span>
    <span class="label">智能</span>
  </div>
  <div class="nav-item" onclick="switchNav(this)">
    <span class="icon">📦</span>
    <span class="label">产品</span>
  </div>
  <div class="nav-item" onclick="switchNav(this)">
    <span class="icon">🛒</span>
    <span class="label">商城</span>
  </div>
  <div class="nav-item" onclick="switchNav(this)">
    <span class="icon">👤</span>
    <span class="label">我的</span>
  </div>
</div>
</div>

<div class="page-detail" id="pageDetail">
  <div class="detail-header">
    <span class="back-btn" onclick="goBack()">←</span>
    <div class="detail-header-info">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-subtitle" id="detailSubtitle"></div>
    </div>
  </div>
  <div class="detail-body">
    <div class="detail-icon-large" id="detailIcon"></div>
    <div class="detail-params" id="detailParams"></div>
    <div class="detail-unbind" onclick="unbindDevice()">解绑设备</div>
  </div>
</div>
</div>

<script>
const devices = [
  { name: '智能灯泡', room: '主卧', icon: '💡', type: 'light', on: true, status: '已开启 · 暖白光', params: [{l:'亮度',v:'80%'}, {l:'色温',v:'暖白光'}, {l:'功率',v:'9W'}, {l:'固件版本',v:'v2.1.3'}] },
  { name: '空调', room: '客厅', icon: '❄️', type: 'ac', on: true, status: '制冷 · 26°C', params: [{l:'模式',v:'制冷'}, {l:'温度',v:'26°C'}, {l:'风速',v:'中'}, {l:'湿度',v:'55%'}] },
  { name: '摄像头', room: '客厅', icon: '📷', type: 'camera', on: false, status: '已关闭', params: [{l:'分辨率',v:'1080P'}, {l:'存储',v:'64GB'}, {l:'夜视',v:'支持'}, {l:'固件版本',v:'v1.8.0'}] },
  { name: '空气净化器', room: '主卧', icon: '🌿', type: 'purifier', on: true, status: 'PM2.5 · 35', params: [{l:'PM2.5',v:'35'}, {l:'滤芯寿命',v:'72%'}, {l:'模式',v:'自动'}, {l:'噪音',v:'35dB'}] },
  { name: '智能风扇', room: '客厅', icon: '🌀', type: 'fan', on: false, status: '已关闭', params: [{l:'风速',v:'3档'}, {l:'摇头',v:'开启'}, {l:'定时',v:'未设置'}, {l:'固件版本',v:'v3.0.1'}] },
  { name: '电视', room: '客厅', icon: '📺', type: 'tv', on: true, status: '播放中', params: [{l:'分辨率',v:'4K'}, {l:'音量',v:'30'}, {l:'信号源',v:'HDMI1'}, {l:'屏幕尺寸',v:'55寸'}] },
  { name: '智能门锁', room: '全屋', icon: '🔒', type: 'lock', on: true, status: '已上锁', params: [{l:'电量',v:'85%'}, {l:'开锁方式',v:'指纹/密码'}, {l:'上次开锁',v:'今天 08:30'}, {l:'固件版本',v:'v4.2.0'}] },
  { name: '扫地机器人', room: '全屋', icon: '🤖', type: 'robot', on: false, status: '已暂停', params: [{l:'清扫面积',v:'85m²'}, {l:'电量',v:'60%'}, {l:'模式',v:'全屋清扫'}, {l:'尘盒',v:'需清理'}] },
];

function renderDevices(filter) {
  const grid = document.getElementById('deviceGrid');
  const filtered = filter === '全屋' ? devices : devices.filter(d => d.room === filter);
  grid.innerHTML = filtered.map(d => `
    <div class="device-card" data-idx="${devices.indexOf(d)}" onclick="openDetail(${devices.indexOf(d)})">
      <div class="device-card-top">
        <div class="device-icon ${d.type}">${d.icon}</div>
        <div class="toggle ${d.on ? 'on' : ''}" onclick="event.stopPropagation();this.classList.toggle('on')"></div>
      </div>
      <div>
        <div class="device-name">${d.name}</div>
        <div class="device-room">${d.room}</div>
      </div>
      <div class="device-status">${d.status}</div>
    </div>
  `).join('');
}

function openDetail(idx) {
  const d = devices[idx];
  document.getElementById('pageHome').classList.add('hide');
  document.getElementById('pageDetail').classList.add('show');
  document.getElementById('detailTitle').textContent = d.name;
  document.getElementById('detailSubtitle').textContent = d.room;
  const iconEl = document.getElementById('detailIcon');
  iconEl.className = 'detail-icon-large device-icon ' + d.type;
  iconEl.textContent = d.icon;
  document.getElementById('detailParams').innerHTML = d.params.map(p => `
    <div class="param-row"><span class="param-label">${p.l}</span><span class="param-value">${p.v}</span></div>
  `).join('');
}

function goBack() {
  document.getElementById('pageDetail').classList.remove('show');
  document.getElementById('pageHome').classList.remove('hide');
}

function unbindDevice() {
  if (confirm('确认解绑该设备？')) goBack();
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDevices(el.textContent);
  renderAnnotations(true);
}

function switchNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

window.__annotations = [
  { id: 1, target: '.device-card[data-idx="0"]', author: '张三', time: '2026-06-28 10:30', content: '智能灯泡卡片：开关按钮位置偏右，建议与图标左对齐，减少误触' },
  { id: 2, target: '.device-card[data-idx="2"]', author: '李四', time: '2026-06-29 14:15', content: '摄像头设备名称文字过小，建议字号增大到15px，提升可读性' },
  { id: 3, target: '.nav-item:nth-child(2)', author: '王五', time: '2026-07-02 08:10', content: '智能导航图标建议使用SVG替代emoji，视觉一致性更好' },
];

function renderAnnotations(show) {
  document.querySelectorAll('.ann-marker, .ann-popup').forEach(e => e.remove());
  if (!show) return;

  window.__annotations.forEach(a => {
    const target = document.querySelector(a.target);
    if (!target) return;

    const marker = document.createElement('div');
    marker.className = 'ann-marker';
    marker.style.top = '-12px';
    marker.style.left = '-12px';
    marker.innerHTML = `<span class="ann-num">${a.id}</span>`;

    const popup = document.createElement('div');
    popup.className = 'ann-popup';
    popup.innerHTML = `
      <div class="ann-popup-author">${a.author}</div>
      <div class="ann-popup-time">${a.time}</div>
      <div class="ann-popup-content">${a.content}</div>
    `;

    marker.addEventListener('mouseenter', () => popup.classList.add('visible'));
    marker.addEventListener('mouseleave', () => {
      setTimeout(() => { if (!popup.matches(':hover')) popup.classList.remove('visible'); }, 150);
    });
    popup.addEventListener('mouseenter', () => popup.classList.add('visible'));
    popup.addEventListener('mouseleave', () => popup.classList.remove('visible'));

    target.appendChild(marker);
    target.appendChild(popup);
  });
}

renderDevices('全屋');
renderAnnotations(true);
</script>
</body>
</html>
