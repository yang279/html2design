<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型标注视图</title>
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="modules/styles.css">
</head>
<body>

<div class="nav-bar">
  <div class="nav-left">
    <button class="back-btn" type="button" aria-label="返回" title="返回">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="page-title" id="pageTitle">PageScope</div>
  </div>
  <div class="nav-tools">
    <select class="device-select" id="devicePreset">
      <optgroup label="手机">
        <option data-width="375" data-height="667" selected>iPhone SE</option>
        <option data-width="414" data-height="896">iPhone XR</option>
        <option data-width="390" data-height="844">iPhone 12 Pro</option>
        <option data-width="430" data-height="932">iPhone 14 Pro Max</option>
        <option data-width="412" data-height="915">Pixel 7</option>
        <option data-width="360" data-height="740">Samsung Galaxy S8+</option>
      </optgroup>
      <optgroup label="平板">
        <option data-width="768" data-height="1024">iPad Mini</option>
        <option data-width="820" data-height="1180">iPad Air</option>
        <option data-width="912" data-height="1368">Surface Pro 7</option>
      </optgroup>
      <optgroup label="其它">
        <option data-width="1024" data-height="600">Nest Hub</option>
        <option data-width="1280" data-height="800">Nest Hub Max</option>
      </optgroup>
    </select>
    <div class="viewport-size">
      <input type="number" class="size-input" id="viewportWidth" min="50" step="1">
      <span class="size-sep">×</span>
      <input type="number" class="size-input" id="viewportHeight" min="50" step="1">
    </div>
    <select class="zoom-select" id="zoomSelect">
      <option value="0.25">25%</option>
      <option value="0.5">50%</option>
      <option value="0.75">75%</option>
      <option value="1" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
    </select>
    <button class="share-btn" type="button" id="shareBtn">分享</button>
    <button class="download-btn" type="button" id="downloadBtn">下载</button>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="mode-bar">
    <button class="mode-btn" data-mode="interact">交互视图</button>
    <button class="mode-btn active" data-mode="annotation">查看标注</button>
    <button class="mode-btn" data-mode="code">代码推荐</button>
  </div>

  <div class="iframe-wrap" id="iframeWrap">
    <div class="device-viewport" id="deviceViewport">
      <div class="device-frame" id="deviceFrame">
        <iframe id="pageFrame" src="http://localhost:8080/mijia.html"></iframe>
      </div>
    </div>
  </div>

  <div id="selectedOverlay" class="selected-overlay" style="display:none;"></div>
  <div id="annotationPopup" class="annotation-popup" style="display:none;"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-toggle">◀</div>
    <div class="sidebar-title" id="sidebarTitle">标注数据</div>
    <div id="sidebarContent">
      <div class="empty-tip"><span>📄</span>等待页面加载...</div>
    </div>
  </div>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
